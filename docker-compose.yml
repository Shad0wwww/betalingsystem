services:

  db:
    image: postgres
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: HEJSA
      POSTGRES_USER: admin
      POSTGRES_DB: betaling
    volumes:
      - db_data:/var/lib/postgresql
  homesite:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "corepack enable && pnpm install && npx prisma generate && npx prisma db push && rm -rf .next && pnpm build && pnpm start"
    env_file:
      - .env
    depends_on:
      - db
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - 8080:80
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - homesite

  ofelia:
    image: mcuadros/ofelia:latest
    depends_on:
      - db
    restart: unless-stopped
    command: daemon
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      # --- JOB 1: Slet fakturaer efter 5 år ---
      ofelia.job-exec.cleanup-invoices.schedule: "0 0 3 * * *"
      ofelia.job-exec.cleanup-invoices.container: "db"
      ofelia.job-exec.cleanup-invoices.command: >
        sh -c "PGPASSWORD=HEJSA psql -U admin -d betaling -c \"DELETE FROM \\\"Invoice\\\" WHERE \\\"createdAt\\\" < NOW() - INTERVAL '5 years';\""

      # --- JOB 2: Slet AuditLogs efter 2 år ---
      ofelia.job-exec.cleanup-logs.schedule: "0 0 4 * * *"
      ofelia.job-exec.cleanup-logs.container: "db"
      ofelia.job-exec.cleanup-logs.command: >
        sh -c "PGPASSWORD=HEJSA psql -U admin -d betaling -c \"DELETE FROM \\\"AuditLog\\\" WHERE \\\"timestamp\\\" < NOW() - INTERVAL '2 years';\""

  adminer:
    image: adminer
    restart: always
    ports:
      - 3001:8080
    depends_on:
      - db
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=eyJhIjoiNzI3Yjg4ZjQ0ODliMDhhYTI5MzE2ZGMzNjI0NWM0MzQiLCJ0IjoiODUzN2YyOTUtZmNhYy00OGFhLTk4ZTUtMTU0NWJmZTJlMzQwIiwicyI6Ik16QTFZV1UxWW1FdE5UTmhaaTAwWmpnNExUZzBPREF0TVdSa00yUmtNR1ZqTkRndyJ9
networks:
  default:
    driver: bridge

volumes:
  db_data:
